name: Build Windows Installer

# Builds ArduinoBotSetup.exe. On a version tag (v1.2.3) it attaches the .exe to a
# GitHub Release (that's the download users click). On other runs it uploads the
# .exe as a workflow artifact so you can test it without cutting a release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release and upload the asset

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, test, build
        run: |
          npx tsc --noEmit
          npm test
          npm run build

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\installer.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArduinoBotSetup
          path: installer/Output/ArduinoBotSetup.exe

      - name: Attach installer to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/ArduinoBotSetup.exe
